<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BrokersBloc Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 2rem;
      text-align: center;
    }

    h1 { color: #1a1a2e; margin-bottom: 0.25rem; }
    h2 { color: #333; }

    /* ── LOGIN ── */
    #login-section {
      max-width: 360px;
      margin: 4rem auto;
      background: #fff;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }

    #login-section input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
    }

    #login-section .btn-row {
      display: flex;
      gap: 0.5rem;
    }

    /* ── BUTTONS ── */
    button {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 0.95rem;
      border-radius: 8px;
      cursor: pointer;
      flex: 1;
    }

    button:hover { background-color: #0056b3; }

    button.secondary {
      background-color: #6c757d;
    }
    button.secondary:hover { background-color: #545b62; }

    button.danger {
      background-color: #dc3545;
    }
    button.danger:hover { background-color: #b02a37; }

    /* ── DASHBOARD TOOLBAR ── */
    #dashboard-toolbar {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    #dashboard-toolbar button {
      flex: 0 1 auto;
    }

    /* ── SUMMARY CARDS ── */
    #rfp-summary {
      display: flex;
      gap: 1.25rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .summary-card {
      background: #fff;
      border: 1px solid #dce3f0;
      border-radius: 10px;
      padding: 1rem 1.75rem;
      min-width: 180px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    .summary-card .label {
      font-size: 0.85rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .summary-card .value {
      font-size: 2rem;
      font-weight: bold;
      color: #007bff;
      margin-top: 0.2rem;
    }

    .summary-card.closed .value { color: #28a745; }

    /* ── RFP CARDS ── */
    #rfp-list {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      text-align: left;
    }

    .rfp-card {
      background: #fff;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 1px 6px rgba(0,0,0,0.09);
      border-left: 5px solid #007bff;
    }

    .rfp-card.stage-done {
      border-left-color: #28a745;
    }

    .rfp-card-title {
      font-size: 1.05rem;
      font-weight: bold;
      color: #1a1a2e;
      margin-bottom: 0.75rem;
    }

    /* ── STAGE PROGRESS ── */
    .stage-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.25rem;
      margin-bottom: 0.85rem;
    }

    .stage-step {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .stage-pill {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      background: #e9ecef;
      color: #888;
      white-space: nowrap;
    }

    .stage-pill.completed {
      background: #d4edda;
      color: #28a745;
    }

    .stage-pill.active {
      background: #007bff;
      color: #fff;
    }

    .stage-arrow {
      color: #ccc;
      font-size: 0.75rem;
    }

    /* ── CARD META ── */
    .rfp-meta {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      font-size: 0.88rem;
      color: #555;
    }

    .rfp-meta span strong {
      color: #1a1a2e;
    }

    .lives-value {
      color: #007bff;
      font-weight: bold;
    }

    /* ── STATUS MESSAGES ── */
    #rfp-loading { color: #666; font-style: italic; margin: 2rem 0; }
    #rfp-error   { color: #dc3545; margin: 2rem 0; }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-section">
    <h2>BrokersBloc Tracker</h2>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <div class="btn-row">
      <button onclick="verifyBroker()">Login</button>
      <button class="secondary" onclick="window.open('https://brokersbloc.com/register/', '_blank')">Register</button>
    </div>
    <p id="login-error" style="color:red; margin-top:0.75rem;"></p>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard-section" style="display:none;">
    <h1>The BrokersBloc Tracker</h1>
    <h2 id="welcome-msg"></h2>

    <div id="dashboard-toolbar">
      <button onclick="openRfpForm()">Submit New RFP</button>
      <button class="secondary" onclick="loadDashboard()">Refresh Tracker</button>
      <button class="danger" onclick="logout()">Logout</button>
    </div>

    <!-- SUMMARY STATS -->
    <div id="rfp-summary" style="display:none">
      <div class="summary-card">
        <div class="label">Total Lives Submitted</div>
        <div class="value" id="total-lives">0</div>
      </div>
      <div class="summary-card closed">
        <div class="label">Lives Closed</div>
        <div class="value" id="closed-lives">0</div>
      </div>
    </div>

    <p id="rfp-loading" style="display:none"></p>
    <p id="rfp-error"   style="display:none"></p>

    <!-- RFP CARDS -->
    <div id="rfp-list"></div>
  </div>

  <script>
    const STAGES = [
      "Census Received",
      "Processing",
      "Engaging Carriers",
      "Preparing Quote",
      "Quote Returned"
    ];

    function buildStageBar(currentStage) {
      const currentIdx = STAGES.indexOf(currentStage);
      return STAGES.map((stage, i) => {
        let cls = "stage-pill";
        if (i < currentIdx)  cls += " completed";
        if (i === currentIdx) cls += " active";
        const arrow = i < STAGES.length - 1 ? `<span class="stage-arrow">›</span>` : "";
        return `<div class="stage-step"><span class="${cls}">${stage}</span>${arrow}</div>`;
      }).join("");
    }

    async function verifyBroker() {
      const email    = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const errEl    = document.getElementById("login-error");
      errEl.textContent = "";

      try {
        const res  = await fetch(`/api/verify-broker?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`);
        const data = await res.json();

        if (res.ok) {
          sessionStorage.setItem("brokerName",     data.brokerName);
          sessionStorage.setItem("brokerEmail",    email);
          sessionStorage.setItem("brokerPassword", password);
          loadDashboard();
        } else {
          errEl.textContent = "Invalid email or password.";
        }
      } catch (e) {
        errEl.textContent = "Could not connect. Please try again.";
      }
    }

    async function loadDashboard() {
      const name = sessionStorage.getItem("brokerName");
      if (!name) return;

      document.getElementById("login-section").style.display     = "none";
      document.getElementById("dashboard-section").style.display = "block";
      document.getElementById("welcome-msg").textContent         = `Welcome, ${name}`;

      const loadingEl  = document.getElementById("rfp-loading");
      const errorEl    = document.getElementById("rfp-error");
      const summaryEl  = document.getElementById("rfp-summary");
      const listEl     = document.getElementById("rfp-list");
      const totalEl    = document.getElementById("total-lives");
      const closedEl   = document.getElementById("closed-lives");

      // reset
      loadingEl.textContent   = "Loading your RFPs...";
      loadingEl.style.display = "block";
      errorEl.style.display   = "none";
      summaryEl.style.display = "none";
      listEl.innerHTML        = "";

      try {
        const res      = await fetch(`/api/projects?broker=${encodeURIComponent(name)}`);
        if (!res.ok) throw new Error("Failed to load RFPs");
        const projects = await res.json();

        loadingEl.style.display = "none";

        if (!projects.length) {
          loadingEl.textContent   = "No RFPs found.";
          loadingEl.style.display = "block";
          return;
        }

        let totalLives = 0;
        let closedLives = 0;

        projects.forEach(p => {
          const lives = p.livesSubmitted;
          if (typeof lives === "number") {
            totalLives += lives;
            if (p.stage === "Quote Returned") closedLives += lives;
          }

          const isDone      = p.stage === "Quote Returned";
          const livesHTML   = lives != null
            ? `<span class="lives-value">${lives.toLocaleString()}</span>`
            : `<span style="color:#aaa;font-style:italic">Not set</span>`;

          const card = document.createElement("div");
          card.className = `rfp-card${isDone ? " stage-done" : ""}`;
          card.innerHTML = `
            <div class="rfp-card-title">${p.projectName}</div>
            <div class="stage-bar">${buildStageBar(p.stage)}</div>
            <div class="rfp-meta">
              <span><strong>Lives Submitted:</strong> ${livesHTML}</span>
              <span><strong>Time Remaining:</strong> ${p.timeRemaining}</span>
            </div>
          `;
          listEl.appendChild(card);
        });

        totalEl.textContent     = totalLives.toLocaleString();
        closedEl.textContent    = closedLives.toLocaleString();
        summaryEl.style.display = "flex";

      } catch (err) {
        loadingEl.style.display = "none";
        errorEl.textContent     = "Could not load RFPs: " + err.message;
        errorEl.style.display   = "block";
      }
    }

    function openRfpForm() {
      const name     = sessionStorage.getItem("brokerName");
      const email    = sessionStorage.getItem("brokerEmail");
      const password = sessionStorage.getItem("brokerPassword");
      const url = `https://airtable.com/appTl5b0TOB6Sh8N5/pagd8oOz2RO9zbYGb/form?prefill_Username=${encodeURIComponent(name)}&prefill_Email=${encodeURIComponent(email)}&prefill_Password=${encodeURIComponent(password)}`;
      window.open(url, "_blank");
    }

    function logout() {
      sessionStorage.clear();
      location.reload();
    }

    // auto-restore session
    if (sessionStorage.getItem("brokerName")) {
      loadDashboard();
    }
  </script>

</body>
</html>
