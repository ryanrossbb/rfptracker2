<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quote Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 2rem;
    }

    button {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    #rfp-section {
      max-width: 900px;
      margin: 2rem auto;
      text-align: left;
    }

    #rfp-summary {
      background: #f0f4ff;
      border: 1px solid #c7d4f0;
      border-radius: 8px;
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      font-size: 1.1rem;
    }

    #rfp-summary span {
      font-weight: bold;
      font-size: 1.4rem;
      color: #007bff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    th {
      background: #007bff;
      color: white;
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
    }

    td {
      padding: 11px 16px;
      border-bottom: 1px solid #e9ecef;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:nth-child(even) {
      background: #f8f9fa;
    }

    .lives-cell {
      font-weight: bold;
      color: #007bff;
    }

    .lives-none {
      color: #aaa;
      font-style: italic;
    }

    #rfp-loading {
      color: #666;
      font-style: italic;
    }

    #rfp-error {
      color: #dc3545;
    }
  </style>
</head>
<body>

  <h1>Welcome to the Quote Tracker</h1>
  <p>Click below to submit a new RFP.</p>

  <button onclick="openPrefilledAirtableForm()">Submit New RFP</button>

  <div id="rfp-section">
    <h2>Your RFPs</h2>
    <div id="rfp-summary" style="display:none">
      Total Lives Submitted: <span id="total-lives">—</span>
    </div>
    <p id="rfp-loading">Loading RFPs...</p>
    <p id="rfp-error" style="display:none"></p>
    <table id="rfp-table" style="display:none">
      <thead>
        <tr>
          <th>RFP Name</th>
          <th>Stage</th>
          <th>Lives Submitted</th>
          <th>Time Remaining</th>
        </tr>
      </thead>
      <tbody id="rfp-tbody"></tbody>
    </table>
  </div>

  <script>
    // 👇 These values should be set earlier in your real app (e.g., at login)
    sessionStorage.setItem("username", "JohnDoe");
    sessionStorage.setItem("email", "john@example.com");
    sessionStorage.setItem("pin", "1234");

    function openPrefilledAirtableForm() {
      const username = sessionStorage.getItem("username");
      const email = sessionStorage.getItem("email");
      const pin = sessionStorage.getItem("pin");

      const baseFormURL = "https://airtable.com/appTl5b0TOB6Sh8N5/pagZ1gx07LILzzVGK/form";

      const prefilledURL = `${baseFormURL}?prefill_Username=${encodeURIComponent(username)}&prefill_Email=${encodeURIComponent(email)}&prefill_PIN=${encodeURIComponent(pin)}`;

      window.open(prefilledURL, '_blank');
    }

    async function loadRFPs() {
      const username = sessionStorage.getItem("username");
      const loadingEl = document.getElementById("rfp-loading");
      const errorEl = document.getElementById("rfp-error");
      const tableEl = document.getElementById("rfp-table");
      const tbodyEl = document.getElementById("rfp-tbody");
      const summaryEl = document.getElementById("rfp-summary");
      const totalLivesEl = document.getElementById("total-lives");

      try {
        const res = await fetch(`/api/projects?broker=${encodeURIComponent(username)}`);
        if (!res.ok) throw new Error("Failed to load RFPs");
        const projects = await res.json();

        loadingEl.style.display = "none";

        if (!projects.length) {
          loadingEl.textContent = "No RFPs found.";
          loadingEl.style.display = "block";
          return;
        }

        let totalLives = 0;
        tbodyEl.innerHTML = "";

        projects.forEach(p => {
          const lives = p.livesSubmitted;
          if (typeof lives === "number") totalLives += lives;

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${p.projectName}</td>
            <td>${p.stage}</td>
            <td class="${lives != null ? "lives-cell" : "lives-none"}">
              ${lives != null ? lives.toLocaleString() : "Not set"}
            </td>
            <td>${p.timeRemaining}</td>
          `;
          tbodyEl.appendChild(tr);
        });

        totalLivesEl.textContent = totalLives > 0 ? totalLives.toLocaleString() : "—";
        summaryEl.style.display = "block";
        tableEl.style.display = "table";

      } catch (err) {
        loadingEl.style.display = "none";
        errorEl.textContent = "Could not load RFPs: " + err.message;
        errorEl.style.display = "block";
      }
    }

    loadRFPs();
  </script>

</body>
</html>
