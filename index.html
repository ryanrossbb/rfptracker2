<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BrokersBloc Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 2rem;
    }

    button {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      margin: 0.25rem;
    }

    button:hover {
      background-color: #0056b3;
    }

    #rfp-section {
      max-width: 900px;
      margin: 2rem auto;
      text-align: left;
    }

    #rfp-summary {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .summary-card {
      background: #f0f4ff;
      border: 1px solid #c7d4f0;
      border-radius: 8px;
      padding: 1rem 1.5rem;
      font-size: 1rem;
      min-width: 200px;
    }

    .summary-card span {
      display: block;
      font-weight: bold;
      font-size: 1.6rem;
      color: #007bff;
      margin-top: 0.25rem;
    }

    .summary-card.closed span {
      color: #28a745;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    th {
      background: #007bff;
      color: white;
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
    }

    td {
      padding: 11px 16px;
      border-bottom: 1px solid #e9ecef;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:nth-child(even) {
      background: #f8f9fa;
    }

    .lives-cell {
      font-weight: bold;
      color: #007bff;
    }

    .lives-none {
      color: #aaa;
      font-style: italic;
    }

    #rfp-loading {
      color: #666;
      font-style: italic;
    }

    #rfp-error {
      color: #dc3545;
    }
  </style>
</head>
<body>

  <div id="login-section">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email" /><br><br>
    <input type="password" id="password" placeholder="Password" /><br><br>
    <button onclick="verifyBroker()">Login</button>
    <p id="login-error" style="color:red;"></p>
  </div>

  <div id="dashboard-section" style="display:none;">
    <h2 id="welcome-msg"></h2>
    <button onclick="openRfpForm()">Submit New RFP</button>
    <button onclick="loadDashboard()">Refresh Tracker</button>
    <button onclick="logout()">Logout</button>

    <div id="rfp-section">
      <h2>Your RFPs</h2>
      <div id="rfp-summary" style="display:none">
        <div class="summary-card">
          Total Lives Submitted
          <span id="total-lives">0</span>
        </div>
        <div class="summary-card closed">
          Lives Closed
          <span id="closed-lives">0</span>
        </div>
      </div>
      <p id="rfp-loading" style="display:none"></p>
      <p id="rfp-error" style="display:none"></p>
      <table id="rfp-table" style="display:none">
        <thead>
          <tr>
            <th>RFP Name</th>
            <th>Stage</th>
            <th>Lives Submitted</th>
            <th>Time Remaining</th>
          </tr>
        </thead>
        <tbody id="rfp-tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
    async function verifyBroker() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const res = await fetch(`/api/verify-broker?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`);
      const data = await res.json();

      if (res.ok) {
        sessionStorage.setItem("brokerName", data.brokerName);
        sessionStorage.setItem("brokerEmail", email);
        sessionStorage.setItem("brokerPassword", password);
        loadDashboard();
      } else {
        document.getElementById("login-error").textContent = "Invalid email or password.";
      }
    }

    async function loadDashboard() {
      const name = sessionStorage.getItem("brokerName");
      if (!name) return;

      document.getElementById("login-section").style.display = "none";
      document.getElementById("dashboard-section").style.display = "block";
      document.getElementById("welcome-msg").textContent = `Welcome, ${name}`;

      const loadingEl = document.getElementById("rfp-loading");
      const errorEl = document.getElementById("rfp-error");
      const tableEl = document.getElementById("rfp-table");
      const tbodyEl = document.getElementById("rfp-tbody");
      const summaryEl = document.getElementById("rfp-summary");
      const totalLivesEl = document.getElementById("total-lives");
      const closedLivesEl = document.getElementById("closed-lives");

      loadingEl.textContent = "Loading RFPs...";
      loadingEl.style.display = "block";
      errorEl.style.display = "none";
      tableEl.style.display = "none";
      summaryEl.style.display = "none";
      tbodyEl.innerHTML = "";

      try {
        const res = await fetch(`/api/projects?broker=${encodeURIComponent(name)}`);
        if (!res.ok) throw new Error("Failed to load RFPs");
        const projects = await res.json();

        loadingEl.style.display = "none";

        if (!projects.length) {
          loadingEl.textContent = "No RFPs found.";
          loadingEl.style.display = "block";
          return;
        }

        let totalLives = 0;
        let closedLives = 0;
        projects.forEach(p => {
          const lives = p.livesSubmitted;
          if (typeof lives === "number") {
            totalLives += lives;
            if (p.stage === "Quote Returned") closedLives += lives;
          }

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${p.projectName}</td>
            <td>${p.stage}</td>
            <td class="${lives != null ? "lives-cell" : "lives-none"}">
              ${lives != null ? lives.toLocaleString() : "Not set"}
            </td>
            <td>${p.timeRemaining}</td>
          `;
          tbodyEl.appendChild(tr);
        });

        totalLivesEl.textContent = totalLives.toLocaleString();
        closedLivesEl.textContent = closedLives.toLocaleString();
        summaryEl.style.display = "flex";
        tableEl.style.display = "table";

      } catch (err) {
        loadingEl.style.display = "none";
        errorEl.textContent = "Could not load RFPs: " + err.message;
        errorEl.style.display = "block";
      }
    }

    function openRfpForm() {
      const name = sessionStorage.getItem("brokerName");
      const email = sessionStorage.getItem("brokerEmail");
      const password = sessionStorage.getItem("brokerPassword");

      const url = `https://airtable.com/appTl5b0TOB6Sh8N5/pagd8oOz2RO9zbYGb/form?prefill_Username=${encodeURIComponent(name)}&prefill_Email=${encodeURIComponent(email)}&prefill_Password=${encodeURIComponent(password)}`;
      window.open(url, "_blank");
    }

    function logout() {
      sessionStorage.clear();
      location.reload();
    }

    if (sessionStorage.getItem("brokerName")) {
      loadDashboard();
    }
  </script>

</body>
</html>
